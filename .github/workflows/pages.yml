name: Deploy web app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (wasm32 target)
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@ead08b90bd7b2e6d81963fb9cf0b7239f66d5db4 # v1.21.0

      # --force: rust-cache can restore .crates.toml claiming trunk is
      # installed while ~/.cargo/bin lacks the binary.
      - name: Install trunk
        run: cargo binstall --no-confirm --force trunk@0.21.14

      - name: Build web app
        working-directory: crates/pksave-app
        run: trunk build --release --public-url /pokemon/

      - name: SPA-style 404 fallback
        run: cp crates/pksave-app/dist/index.html crates/pksave-app/dist/404.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: crates/pksave-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Best-effort enablement: a workflow GITHUB_TOKEN cannot create the
      # Pages site (that needs repo-admin), so until Pages is enabled once
      # in the repo settings this step fails — with the instruction below.
      - name: Configure GitHub Pages
        id: configure
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Explain how to enable Pages (on failure)
        if: failure()
        run: |
          echo '## GitHub Pages is not enabled for this repository' >> "$GITHUB_STEP_SUMMARY"
          echo 'A workflow token cannot enable it. One-time manual step:' >> "$GITHUB_STEP_SUMMARY"
          echo '**Settings → Pages → Build and deployment → Source: GitHub Actions**, then re-run this workflow.' >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
