# cargo-deny configuration (https://embarkstudios.github.io/cargo-deny/)
# Checked in CI: `cargo deny check` must exit 0.

[graph]
all-features = false

[licenses]
# The workspace itself is MIT. The allowlist below covers exactly what the
# current dependency tree uses; extend it deliberately when a new dependency
# introduces a new license.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    # egui bundles its default fonts (Font Awesome / Ubuntu font family).
    "OFL-1.1",
    "Ubuntu-font-1.0",
    "BSL-1.0",
]

[advisories]
ignore = [
    # quick-xml issues reachable only through wayland-scanner, which runs
    # quick-xml at build time to generate Rust code from the (vendored)
    # Wayland protocol XML on Linux. No attacker-controlled XML is ever
    # parsed at runtime.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # ttf-parser is unmaintained; it is pulled in via sctk-adwaita (Linux
    # client-side window decorations) and only parses locally installed
    # system fonts, never user-supplied save files.
    "RUSTSEC-2026-0192",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
